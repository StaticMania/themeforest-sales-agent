name: Daily ThemeForest Sales

on:
  schedule:
    # 8:17 PM in GMT+6 — minute offset avoids GitHub dropping jobs at :00
    - cron: '17 20 * * *'
      timezone: Asia/Dhaka
  workflow_dispatch:

permissions:
  contents: write
  pages: write      # for GitHub Pages deployment
  id-token: write   # for GitHub Pages deployment

jobs:
  track-sales:
    runs-on: ubuntu-latest
    # If you use Environment secrets (Settings → Environments), uncomment and set the name:
    # environment: production
    env:
      ENVATO_API_TOKEN: ${{ secrets.ENVATO_API_TOKEN || vars.ENVATO_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || vars.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify credentials
        run: |
          missing=""
          [ -z "$ENVATO_API_TOKEN" ] && missing="$missing ENVATO_API_TOKEN"
          [ -z "$TELEGRAM_BOT_TOKEN" ] && missing="$missing TELEGRAM_BOT_TOKEN"
          [ -z "$TELEGRAM_CHAT_ID" ] && missing="$missing TELEGRAM_CHAT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing:$missing"
            echo "Add them as repository Secrets (recommended) or Variables:"
            echo "  Repo → Settings → Secrets and variables → Actions"
            echo "Names must match exactly: ENVATO_API_TOKEN, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID"
            echo "If stored under an Environment, add 'environment: your-env-name' to this job."
            exit 1
          fi
          echo "All required credentials present."
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack: configured"
          else
            echo "Slack: skipped (SLACK_WEBHOOK_URL not set)"
          fi

      - name: Track sales
        run: npm start

      - name: Commit updated data.json
        run: |
          if git diff --quiet data.json; then
            echo "No changes to data.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: update sales data"
            git push
          fi

      # --- Dashboard Deployment ---
      - name: Prepare dashboard data
        run: |
          # The index.js now writes dashboard/sales-history.json automatically
          # Verify it exists
          ls -la dashboard/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: update sales dashboard'